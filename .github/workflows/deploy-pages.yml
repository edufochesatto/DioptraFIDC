name: Deploy Dashboard

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas numpy openpyxl requests

      - name: Run Dioptra FIDC
        run: |
          python main.py

      - name: Gerar dados.json para o site
        run: |
          python -c "
import json
import pandas as pd
try:
    df = pd.read_pickle('output/dados.pkl')
    fundos = df.fillna(0).to_dict('records')
    metricas = {}
    print(f'✅ {len(fundos)} fundos exportados para dados.json')
except:
    fundos = []
    metricas = {}
    print('⚠ Nenhum dado pickle encontrado, usando JSON vazio')
with open('docs/dados.json', 'w') as f:
    json.dump({
        'fundos': fundos,
        'metricas': metricas,
        'gerado_em': '2026-07-16',
        'versao': 'Julho/2026'
    }, f, indent=2, ensure_ascii=False, default=str)
"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
